<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Cockpit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          surface: '#161b22',
          base:    '#0d1117',
          border:  '#30363d',
          muted:   '#8b949e',
          subtle:  '#21262d',
        },
        keyframes: {
          'slide-in': {
            '0%':   { opacity: '0', transform: 'translateY(-4px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
        },
        animation: {
          'slide-in': 'slide-in 0.18s ease',
        },
      }
    }
  }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body
  class="bg-base text-[#e6edf3] font-['Segoe_UI',system-ui,monospace] text-sm h-screen flex flex-col overflow-hidden"
  x-data="cockpit()"
  x-init="init()"
>

<!-- ═══════════════════════════════════════════════════════════ Header ═══ -->
<header class="shrink-0 flex items-center justify-between px-4 py-2 bg-surface border-b border-border z-20">
  <h1 class="text-sm font-semibold tracking-widest text-[#58a6ff]">TRADER COCKPIT</h1>

  <div class="flex items-center gap-3">
    <!-- Index bias pills -->
    <div class="hidden sm:flex items-center gap-3 text-xs font-semibold">
      <template x-for="idx in ['nifty','banknifty','sensex']" :key="idx">
        <span class="flex items-center gap-1">
          <span class="text-muted uppercase" x-text="idx"></span>
          <span
            :class="{
              'text-[#3fb950]': bias[idx] === 'BULLISH',
              'text-[#f85149]': bias[idx] === 'BEARISH',
              'text-muted':     bias[idx] !== 'BULLISH' && bias[idx] !== 'BEARISH',
            }"
            x-text="bias[idx] === 'BULLISH' ? '↑' : bias[idx] === 'BEARISH' ? '↓' : '—'"
          ></span>
        </span>
      </template>
    </div>

    <!-- Phase badge -->
    <span
      class="text-[11px] font-bold tracking-wide px-2 py-0.5 rounded"
      :style="phaseBadgeStyle()"
      x-text="phase.replace(/_/g,' ')"
    ></span>

    <!-- Clock -->
    <span class="text-muted text-xs tabular-nums" x-text="clock"></span>
  </div>
</header>

<!-- ══════════════════════════════════════════════════ Filter toolbar ═══ -->
<div class="shrink-0 flex items-center justify-between px-4 py-1.5 bg-surface border-b border-[#21262d] gap-3 z-10">

  <!-- Filter tabs -->
  <div class="flex items-center gap-1.5">
    <template x-for="tab in tabs" :key="tab.key">
      <button
        @click="setFilter(tab.key)"
        :class="[
          'text-[11px] font-bold tracking-wide px-3 py-1 rounded border transition-colors',
          filter === tab.key ? tab.activeClass : 'bg-subtle border-border text-muted hover:text-[#e6edf3] hover:border-[#58a6ff]'
        ]"
        x-text="tab.label"
      ></button>
    </template>
  </div>

  <div class="flex items-center gap-3">
    <!-- Value (ADV) filter -->
    <div class="flex items-center gap-1">
      <span class="text-muted text-[10px] mr-0.5 hidden sm:block">VALUE</span>
      <template x-for="tier in valueTiers" :key="tier.cr">
        <button
          @click="minValue = tier.cr"
          :class="[
            'text-[10px] font-bold px-2 py-1 rounded border transition-colors',
            minValue === tier.cr
              ? 'bg-[#1a2233] border-[#58a6ff] text-[#58a6ff]'
              : 'bg-subtle border-border text-muted hover:border-[#58a6ff] hover:text-[#e6edf3]'
          ]"
          x-text="tier.label"
        ></button>
      </template>
    </div>

    <!-- Signal count -->
    <span class="text-muted text-[11px] tabular-nums hidden sm:block">
      <span x-text="filteredSignals.length"></span> / <span x-text="signals.length"></span>
    </span>

    <!-- Clear button -->
    <button
      @click="signals = []"
      class="text-[11px] font-semibold text-muted hover:text-[#f85149] border border-border hover:border-[#f85149] px-2.5 py-1 rounded transition-colors"
    >CLEAR</button>

    <!-- Pause / Resume -->
    <button
      @click="togglePause()"
      :class="[
        'text-[11px] font-bold px-3 py-1 rounded border flex items-center gap-1.5 transition-colors',
        paused
          ? 'bg-[#2d2118] border-[#d29922] text-[#d29922]'
          : 'bg-subtle border-border text-muted hover:border-[#d29922] hover:text-[#d29922]'
      ]"
    >
      <span x-text="paused ? '▶' : '⏸'"></span>
      <span x-text="paused ? 'RESUME' : 'PAUSE'"></span>
      <span
        x-show="paused && pending.length > 0"
        x-text="pending.length"
        class="bg-[#d29922] text-[#0d1117] text-[10px] font-black px-1.5 rounded-full"
      ></span>
    </button>

    <!-- History toggle -->
    <button
      @click="toggleHistory()"
      :class="[
        'text-[11px] font-bold px-3 py-1 rounded border flex items-center gap-1.5 transition-colors',
        historyMode
          ? 'bg-[#1a2233] border-[#58a6ff] text-[#58a6ff]'
          : 'bg-subtle border-border text-muted hover:border-[#58a6ff] hover:text-[#58a6ff]'
      ]"
    >
      <span x-text="historyMode ? '← LIVE' : '⏮ HISTORY'"></span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ Signal feed ═══ -->
<div class="flex-1 overflow-y-auto p-4" id="feed" x-show="!historyMode">

  <!-- Empty state -->
  <div x-show="signals.length === 0" class="flex flex-col items-center justify-center h-full text-muted text-xs gap-2">
    <span class="text-2xl">📡</span>
    <span>Waiting for signals — market opens at 09:15 IST</span>
  </div>

  <!-- Card grid -->
  <div class="flex flex-wrap gap-4 content-start">
    <template x-for="s in filteredSignals" :key="s.id">
      <div class="relative animate-slide-in">

        <!-- Count badge — corner notification -->
        <template x-if="s._count > 1">
          <div class="absolute -top-2.5 -right-2.5 z-10 min-w-[22px] h-[22px] px-1 rounded-full text-[#0d1117] text-[11px] font-black flex items-center justify-center leading-none shadow"
               style="background:#d29922">
            <span x-text="s._count"></span>
          </div>
        </template>

        <!-- Card -->
        <div class="w-52 rounded-xl overflow-hidden border border-[#30363d]"
             :style="cardStyle(s.signal_type)">

          <!-- Coloured top bar -->
          <div class="h-1 w-full" :style="'background:' + signalColor(s.signal_type)"></div>

          <!-- Symbol row -->
          <div class="flex items-center justify-between px-3 pt-2 pb-0.5">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full shrink-0" :style="'background:' + dirColor(s.direction)"></span>
              <span class="font-bold text-[13px] tracking-wide" x-text="s.symbol"></span>
            </div>
            <!-- Type badge with tooltip hint -->
            <span class="text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded cursor-default"
                  :style="typeStyle(s.signal_type)"
                  :title="signalDesc(s.signal_type)"
                  x-text="shortType(s.signal_type)"></span>
          </div>

          <!-- Signal description (small subtitle) -->
          <p class="px-3 pb-1 text-[10px] leading-tight" :style="'color:' + signalColor(s.signal_type) + ';opacity:0.75'" x-text="signalDesc(s.signal_type)"></p>

          <!-- MTF confluence badges (only shown when directional) -->
          <div class="flex gap-1 px-3 pb-1.5">
            <span x-show="s.bias_15m === 'BULLISH' || s.bias_15m === 'BEARISH'"
                  class="text-[9px] font-bold px-1.5 py-0.5 rounded tabular-nums"
                  :style="'background:' + dirColor(s.bias_15m) + '22;color:' + dirColor(s.bias_15m)"
                  x-text="'15m ' + (s.bias_15m === 'BULLISH' ? '▲' : '▼')"></span>
            <span x-show="s.bias_1h === 'BULLISH' || s.bias_1h === 'BEARISH'"
                  class="text-[9px] font-bold px-1.5 py-0.5 rounded tabular-nums"
                  :style="'background:' + dirColor(s.bias_1h) + '22;color:' + dirColor(s.bias_1h)"
                  x-text="'1h ' + (s.bias_1h === 'BULLISH' ? '▲' : '▼')"></span>
          </div>

          <!-- Price + Vol -->
          <div class="flex items-baseline justify-between px-3 pb-1">
            <span class="font-mono font-bold text-[16px] text-[#e6edf3] tabular-nums" x-text="s.price ? Number(s.price).toFixed(2) : '—'"></span>
            <span x-show="s.volume_ratio != null" class="text-[10px]" style="color:#8b949e">
              Vol <span style="color:#e6edf3;font-weight:600" x-text="s.volume_ratio ? Number(s.volume_ratio).toFixed(1)+'×' : ''"></span>
            </span>
          </div>

          <!-- Structural level context badges -->
          <template x-if="metricsCache[s.symbol] && s.price">
            <div class="flex flex-wrap gap-1 px-3 pb-1.5">
              <span x-show="metricsCache[s.symbol].prev_day_high && s.price > metricsCache[s.symbol].prev_day_high"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#3fb95022;color:#3fb950"
                    x-text="'PDH +' + ((s.price - metricsCache[s.symbol].prev_day_high) / metricsCache[s.symbol].prev_day_high * 100).toFixed(1) + '% ▲'"></span>
              <span x-show="metricsCache[s.symbol].prev_day_low && s.price < metricsCache[s.symbol].prev_day_low"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                    x-text="'PDL ' + ((s.price - metricsCache[s.symbol].prev_day_low) / metricsCache[s.symbol].prev_day_low * 100).toFixed(1) + '% ▼'"></span>
              <span x-show="metricsCache[s.symbol].prev_week_high && s.price > metricsCache[s.symbol].prev_week_high"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#3fb95022;color:#3fb950"
                    x-text="'PWH +' + ((s.price - metricsCache[s.symbol].prev_week_high) / metricsCache[s.symbol].prev_week_high * 100).toFixed(1) + '% ▲'"></span>
              <span x-show="metricsCache[s.symbol].prev_week_low && s.price < metricsCache[s.symbol].prev_week_low"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                    x-text="'PWL ' + ((s.price - metricsCache[s.symbol].prev_week_low) / metricsCache[s.symbol].prev_week_low * 100).toFixed(1) + '% ▼'"></span>
              <span x-show="metricsCache[s.symbol].prev_month_high && s.price > metricsCache[s.symbol].prev_month_high"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#58a6ff22;color:#58a6ff"
                    x-text="'PMH +' + ((s.price - metricsCache[s.symbol].prev_month_high) / metricsCache[s.symbol].prev_month_high * 100).toFixed(1) + '% ▲'"></span>
              <span x-show="metricsCache[s.symbol].prev_month_low && s.price < metricsCache[s.symbol].prev_month_low"
                    class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                    x-text="'PML ' + ((s.price - metricsCache[s.symbol].prev_month_low) / metricsCache[s.symbol].prev_month_low * 100).toFixed(1) + '% ▼'"></span>
            </div>
          </template>

          <!-- Entry / SL / T1 levels -->
          <template x-if="s.entry_low != null || s.stop != null">
            <div class="flex flex-wrap gap-x-3 gap-y-0.5 px-3 pb-2 text-[10px]" style="color:#8b949e">
              <span x-show="s.entry_low != null">E <span style="color:#d29922;font-weight:600" x-text="fmt(s.entry_low)+'–'+fmt(s.entry_high)"></span></span>
              <span x-show="s.stop != null">SL <span style="color:#f85149;font-weight:600" x-text="fmt(s.stop)"></span></span>
              <span x-show="s.target_1 != null">T1 <span style="color:#3fb950;font-weight:600" x-text="fmt(s.target_1)"></span></span>
              <span x-show="s.trail_stop != null">Trail <span style="color:#58a6ff;font-weight:600" x-text="fmt(s.trail_stop)"></span></span>
            </div>
          </template>

          <!-- Metrics (reactive: reads directly from metricsCache) -->
          <template x-if="metricsCache[s.symbol]">
            <div class="border-t px-3 py-2 grid grid-cols-2 gap-x-3 gap-y-1 text-[10px]"
                 style="border-color:#21262d;color:#8b949e">

              <span x-show="metricsCache[s.symbol].day_high && s.price">DH
                <span class="font-semibold tabular-nums"
                      :style="'color:' + pctColor(s.price, metricsCache[s.symbol].day_high)"
                      x-text="spct(s.price, metricsCache[s.symbol].day_high)"></span>
              </span>

              <span x-show="metricsCache[s.symbol].day_low && s.price">DL
                <span class="font-semibold tabular-nums"
                      :style="'color:' + pctColor(s.price, metricsCache[s.symbol].day_low)"
                      x-text="spct(s.price, metricsCache[s.symbol].day_low)"></span>
              </span>

              <span x-show="metricsCache[s.symbol].week52_high && s.price">52H
                <span class="font-semibold tabular-nums"
                      :style="'color:' + pctColor(s.price, metricsCache[s.symbol].week52_high)"
                      x-text="spct(s.price, metricsCache[s.symbol].week52_high)"></span>
              </span>

              <span x-show="metricsCache[s.symbol].week52_low && s.price">52L
                <span class="font-semibold tabular-nums"
                      :style="'color:' + pctColor(s.price, metricsCache[s.symbol].week52_low)"
                      x-text="spct(s.price, metricsCache[s.symbol].week52_low)"></span>
              </span>

              <span x-show="metricsCache[s.symbol].atr_14">ATR
                <span class="font-semibold" style="color:#d29922" x-text="fmt(metricsCache[s.symbol].atr_14)"></span>
              </span>

              <span x-show="metricsCache[s.symbol].adv_20_cr != null">ADV
                <span class="font-semibold tabular-nums"
                      :style="'color:' + (metricsCache[s.symbol].adv_20_cr >= 500 ? '#3fb950' : metricsCache[s.symbol].adv_20_cr >= 100 ? '#d29922' : metricsCache[s.symbol].adv_20_cr >= 25 ? '#e6edf3' : '#8b949e')"
                      x-text="metricsCache[s.symbol].adv_20_cr >= 100 ? Math.round(metricsCache[s.symbol].adv_20_cr)+'Cr' : metricsCache[s.symbol].adv_20_cr.toFixed(1)+'Cr'"></span>
              </span>

              <span x-show="metricsCache[s.symbol].day_chg_pct != null">
                <span class="font-bold tabular-nums"
                      :style="'color:' + (metricsCache[s.symbol].day_chg_pct >= 0 ? '#3fb950' : '#f85149')"
                      x-text="(metricsCache[s.symbol].day_chg_pct >= 0 ? '+' : '') + metricsCache[s.symbol].day_chg_pct.toFixed(2) + '%'"></span>
              </span>

            </div>
          </template>

          <!-- Footer: O=H / O=L + time -->
          <div class="flex items-center justify-between px-3 py-1.5 border-t" style="border-color:#21262d">
            <div class="flex gap-1">
              <template x-if="metricsCache[s.symbol] && metricsCache[s.symbol].day_high && metricsCache[s.symbol].day_open && Math.abs(metricsCache[s.symbol].day_high - metricsCache[s.symbol].day_open) / metricsCache[s.symbol].day_open < 0.001">
                <span class="px-1.5 py-0.5 rounded text-[9px] font-black" style="background:#2d1818;color:#f85149">O=H ↓</span>
              </template>
              <template x-if="metricsCache[s.symbol] && metricsCache[s.symbol].day_low && metricsCache[s.symbol].day_open && Math.abs(metricsCache[s.symbol].day_open - metricsCache[s.symbol].day_low) / metricsCache[s.symbol].day_open < 0.001">
                <span class="px-1.5 py-0.5 rounded text-[9px] font-black" style="background:#1a2d1a;color:#3fb950">O=L ↑</span>
              </template>
            </div>
            <span class="text-[10px] tabular-nums" style="color:#8b949e" x-text="timeStr(s.timestamp)"></span>
          </div>

          <!-- Note -->
          <div class="border-t px-3 py-1.5" style="border-color:#21262d">
            <div x-show="!noteEditing[s.id]" class="flex items-start gap-1.5 min-h-[18px]">
              <span
                x-show="!!notes[s.id]"
                class="text-[10px] leading-snug flex-1 break-words"
                style="color:#8b949e"
                x-text="notes[s.id]"
              ></span>
              <button
                @click="startEditNote(s.id)"
                class="text-[9px] shrink-0 ml-auto hover:opacity-100 transition-opacity"
                :style="notes[s.id] ? 'color:#484f58;opacity:0.6' : 'color:#484f58'"
                x-text="notes[s.id] ? '✎' : '+ note'"
              ></button>
            </div>
            <div x-show="noteEditing[s.id]" class="flex flex-col gap-1">
              <textarea
                x-model="noteDrafts[s.id]"
                @keydown.enter.prevent="commitNote(s.id)"
                @keydown.escape="cancelNote(s.id)"
                rows="2"
                class="w-full bg-[#0d1117] border border-[#30363d] rounded text-[10px] text-[#e6edf3] px-1.5 py-1 resize-none focus:outline-none focus:border-[#58a6ff]"
                placeholder="Add a note…"
              ></textarea>
              <div class="flex gap-1.5 justify-end">
                <button @click="cancelNote(s.id)" class="text-[9px] text-muted hover:text-[#e6edf3]">cancel</button>
                <button @click="commitNote(s.id)" class="text-[9px] font-bold" style="color:#58a6ff">save</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </template>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ History panel ═══ -->
<div class="flex-1 flex flex-col overflow-hidden" x-show="historyMode">

  <!-- Date picker bar -->
  <div class="shrink-0 flex items-center gap-2 px-4 py-2 bg-surface border-b border-border flex-wrap">
    <span class="text-muted text-[11px] font-bold tracking-wider">DATE</span>
    <input
      type="date"
      x-model="historyDate"
      @change="loadHistory()"
      class="bg-subtle border border-border text-[#e6edf3] text-xs rounded px-2 py-0.5 focus:outline-none focus:border-[#58a6ff]"
    />
    <template x-for="d in historyDates.slice(0, 7)" :key="d">
      <button
        @click="historyDate = d; loadHistory()"
        :class="[
          'text-[10px] font-bold px-2 py-1 rounded border transition-colors',
          historyDate === d
            ? 'bg-[#1a2233] border-[#58a6ff] text-[#58a6ff]'
            : 'bg-subtle border-border text-muted hover:border-[#58a6ff] hover:text-[#e6edf3]'
        ]"
        x-text="d"
      ></button>
    </template>
    <span x-show="historyLoading" class="text-muted text-[11px] animate-pulse">Loading…</span>
    <span x-show="!historyLoading && historySignals.length > 0" class="text-muted text-[11px] ml-auto">
      <span x-text="filteredHistory.length"></span> / <span x-text="historySignals.length"></span> signals
    </span>
  </div>

  <!-- History cards -->
  <div class="flex-1 overflow-y-auto p-4">

    <div x-show="historyLoading" class="flex flex-col items-center justify-center h-full text-muted text-xs gap-2">
      <span class="text-2xl animate-pulse">⏳</span>
      <span>Loading history…</span>
    </div>

    <div x-show="!historyLoading && historySignals.length === 0" class="flex flex-col items-center justify-center h-full text-muted text-xs gap-2">
      <span class="text-2xl">📂</span>
      <span>No signals saved for <span x-text="historyDate"></span></span>
    </div>

    <div class="flex flex-wrap gap-4 content-start">
      <template x-for="s in filteredHistory" :key="s.symbol + s.signal_type + s.timestamp">
        <div class="relative animate-slide-in">
          <div class="w-52 rounded-xl overflow-hidden border border-[#30363d]"
               :style="cardStyle(s.signal_type)">
            <div class="h-1 w-full" :style="'background:' + signalColor(s.signal_type)"></div>
            <div class="flex items-center justify-between px-3 pt-2 pb-0.5">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full shrink-0" :style="'background:' + dirColor(s.direction)"></span>
                <span class="font-bold text-[13px] tracking-wide" x-text="s.symbol"></span>
              </div>
              <span class="text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded cursor-default"
                    :style="typeStyle(s.signal_type)"
                    :title="signalDesc(s.signal_type)"
                    x-text="shortType(s.signal_type)"></span>
            </div>
            <p class="px-3 pb-1 text-[10px] leading-tight" :style="'color:' + signalColor(s.signal_type) + ';opacity:0.75'" x-text="signalDesc(s.signal_type)"></p>
            <!-- MTF confluence badges (only shown when directional) -->
            <div class="flex gap-1 px-3 pb-1.5">
              <span x-show="s.bias_15m === 'BULLISH' || s.bias_15m === 'BEARISH'"
                    class="text-[9px] font-bold px-1.5 py-0.5 rounded tabular-nums"
                    :style="'background:' + dirColor(s.bias_15m) + '22;color:' + dirColor(s.bias_15m)"
                    x-text="'15m ' + (s.bias_15m === 'BULLISH' ? '▲' : '▼')"></span>
              <span x-show="s.bias_1h === 'BULLISH' || s.bias_1h === 'BEARISH'"
                    class="text-[9px] font-bold px-1.5 py-0.5 rounded tabular-nums"
                    :style="'background:' + dirColor(s.bias_1h) + '22;color:' + dirColor(s.bias_1h)"
                    x-text="'1h ' + (s.bias_1h === 'BULLISH' ? '▲' : '▼')"></span>
            </div>
            <div class="flex items-baseline justify-between px-3 pb-1">
              <span class="font-mono font-bold text-[16px] text-[#e6edf3] tabular-nums" x-text="s.price ? Number(s.price).toFixed(2) : '—'"></span>
              <span x-show="s.volume_ratio != null" class="text-[10px]" style="color:#8b949e">
                Vol <span style="color:#e6edf3;font-weight:600" x-text="s.volume_ratio ? Number(s.volume_ratio).toFixed(1)+'×' : ''"></span>
              </span>
            </div>
            <!-- Structural level context badges -->
            <template x-if="metricsCache[s.symbol] && s.price">
              <div class="flex flex-wrap gap-1 px-3 pb-1.5">
                <span x-show="metricsCache[s.symbol].prev_day_high && s.price > metricsCache[s.symbol].prev_day_high"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#3fb95022;color:#3fb950"
                      x-text="'PDH +' + ((s.price - metricsCache[s.symbol].prev_day_high) / metricsCache[s.symbol].prev_day_high * 100).toFixed(1) + '% ▲'"></span>
                <span x-show="metricsCache[s.symbol].prev_day_low && s.price < metricsCache[s.symbol].prev_day_low"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                      x-text="'PDL ' + ((s.price - metricsCache[s.symbol].prev_day_low) / metricsCache[s.symbol].prev_day_low * 100).toFixed(1) + '% ▼'"></span>
                <span x-show="metricsCache[s.symbol].prev_week_high && s.price > metricsCache[s.symbol].prev_week_high"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#3fb95022;color:#3fb950"
                      x-text="'PWH +' + ((s.price - metricsCache[s.symbol].prev_week_high) / metricsCache[s.symbol].prev_week_high * 100).toFixed(1) + '% ▲'"></span>
                <span x-show="metricsCache[s.symbol].prev_week_low && s.price < metricsCache[s.symbol].prev_week_low"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                      x-text="'PWL ' + ((s.price - metricsCache[s.symbol].prev_week_low) / metricsCache[s.symbol].prev_week_low * 100).toFixed(1) + '% ▼'"></span>
                <span x-show="metricsCache[s.symbol].prev_month_high && s.price > metricsCache[s.symbol].prev_month_high"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#58a6ff22;color:#58a6ff"
                      x-text="'PMH +' + ((s.price - metricsCache[s.symbol].prev_month_high) / metricsCache[s.symbol].prev_month_high * 100).toFixed(1) + '% ▲'"></span>
                <span x-show="metricsCache[s.symbol].prev_month_low && s.price < metricsCache[s.symbol].prev_month_low"
                      class="text-[9px] font-bold px-1 py-0.5 rounded" style="background:#f8514922;color:#f85149"
                      x-text="'PML ' + ((s.price - metricsCache[s.symbol].prev_month_low) / metricsCache[s.symbol].prev_month_low * 100).toFixed(1) + '% ▼'"></span>
              </div>
            </template>
            <template x-if="s.entry_low != null || s.stop != null">
              <div class="flex flex-wrap gap-x-3 gap-y-0.5 px-3 pb-2 text-[10px]" style="color:#8b949e">
                <span x-show="s.entry_low != null">E <span style="color:#d29922;font-weight:600" x-text="fmt(s.entry_low)+'–'+fmt(s.entry_high)"></span></span>
                <span x-show="s.stop != null">SL <span style="color:#f85149;font-weight:600" x-text="fmt(s.stop)"></span></span>
                <span x-show="s.target_1 != null">T1 <span style="color:#3fb950;font-weight:600" x-text="fmt(s.target_1)"></span></span>
                <span x-show="s.trail_stop != null">Trail <span style="color:#58a6ff;font-weight:600" x-text="fmt(s.trail_stop)"></span></span>
              </div>
            </template>
            <template x-if="metricsCache[s.symbol]">
              <div class="border-t px-3 py-2 grid grid-cols-2 gap-x-3 gap-y-1 text-[10px]"
                   style="border-color:#21262d;color:#8b949e">
                <span x-show="metricsCache[s.symbol].day_high && s.price">DH
                  <span class="font-semibold tabular-nums"
                        :style="'color:' + pctColor(s.price, metricsCache[s.symbol].day_high)"
                        x-text="spct(s.price, metricsCache[s.symbol].day_high)"></span>
                </span>
                <span x-show="metricsCache[s.symbol].day_low && s.price">DL
                  <span class="font-semibold tabular-nums"
                        :style="'color:' + pctColor(s.price, metricsCache[s.symbol].day_low)"
                        x-text="spct(s.price, metricsCache[s.symbol].day_low)"></span>
                </span>
                <span x-show="metricsCache[s.symbol].week52_high && s.price">52H
                  <span class="font-semibold tabular-nums"
                        :style="'color:' + pctColor(s.price, metricsCache[s.symbol].week52_high)"
                        x-text="spct(s.price, metricsCache[s.symbol].week52_high)"></span>
                </span>
                <span x-show="metricsCache[s.symbol].week52_low && s.price">52L
                  <span class="font-semibold tabular-nums"
                        :style="'color:' + pctColor(s.price, metricsCache[s.symbol].week52_low)"
                        x-text="spct(s.price, metricsCache[s.symbol].week52_low)"></span>
                </span>
                <span x-show="metricsCache[s.symbol].atr_14">ATR
                  <span class="font-semibold" style="color:#d29922" x-text="fmt(metricsCache[s.symbol].atr_14)"></span>
                </span>
                <span x-show="metricsCache[s.symbol].adv_20_cr != null">ADV
                  <span class="font-semibold tabular-nums"
                        :style="'color:' + (metricsCache[s.symbol].adv_20_cr >= 500 ? '#3fb950' : metricsCache[s.symbol].adv_20_cr >= 100 ? '#d29922' : metricsCache[s.symbol].adv_20_cr >= 25 ? '#e6edf3' : '#8b949e')"
                        x-text="metricsCache[s.symbol].adv_20_cr >= 100 ? Math.round(metricsCache[s.symbol].adv_20_cr)+'Cr' : metricsCache[s.symbol].adv_20_cr.toFixed(1)+'Cr'"></span>
                </span>

                <span x-show="metricsCache[s.symbol].day_chg_pct != null">
                  <span class="font-bold tabular-nums"
                        :style="'color:' + (metricsCache[s.symbol].day_chg_pct >= 0 ? '#3fb950' : '#f85149')"
                        x-text="(metricsCache[s.symbol].day_chg_pct >= 0 ? '+' : '') + metricsCache[s.symbol].day_chg_pct.toFixed(2) + '%'"></span>
                </span>
              </div>
            </template>
            <div class="flex items-center justify-between px-3 py-1.5 border-t" style="border-color:#21262d">
              <span class="text-[10px] font-bold" style="color:#58a6ff" x-text="timeStr(s.timestamp)"></span>
            </div>

            <!-- Note -->
            <div class="border-t px-3 py-1.5" style="border-color:#21262d">
              <div x-show="!noteEditing[s.id]" class="flex items-start gap-1.5 min-h-[18px]">
                <span
                  x-show="!!notes[s.id]"
                  class="text-[10px] leading-snug flex-1 break-words"
                  style="color:#8b949e"
                  x-text="notes[s.id]"
                ></span>
                <button
                  @click="startEditNote(s.id)"
                  class="text-[9px] shrink-0 ml-auto hover:opacity-100 transition-opacity"
                  :style="notes[s.id] ? 'color:#484f58;opacity:0.6' : 'color:#484f58'"
                  x-text="notes[s.id] ? '✎' : '+ note'"
                ></button>
              </div>
              <div x-show="noteEditing[s.id]" class="flex flex-col gap-1">
                <textarea
                  x-model="noteDrafts[s.id]"
                  @keydown.enter.prevent="commitNote(s.id)"
                  @keydown.escape="cancelNote(s.id)"
                  rows="2"
                  class="w-full bg-[#0d1117] border border-[#30363d] rounded text-[10px] text-[#e6edf3] px-1.5 py-1 resize-none focus:outline-none focus:border-[#58a6ff]"
                  placeholder="Add a note…"
                ></textarea>
                <div class="flex gap-1.5 justify-end">
                  <button @click="cancelNote(s.id)" class="text-[9px] text-muted hover:text-[#e6edf3]">cancel</button>
                  <button @click="commitNote(s.id)" class="text-[9px] font-bold" style="color:#58a6ff">save</button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </template>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════ Connection indicator ═══ -->
<div
  id="conn-status"
  class="fixed bottom-3 right-4 text-[11px] px-3 py-1 rounded-full bg-subtle"
  :class="{
    'text-[#3fb950]': connState === 'connected',
    'text-[#f85149]': connState === 'disconnected',
    'text-[#d29922]': connState === 'connecting',
  }"
  x-text="connState === 'connected' ? 'Connected' : connState === 'disconnected' ? 'Reconnecting…' : 'Connecting…'"
></div>

<!-- ══════════════════════════════════════════════════════════ Scripts ═══ -->
<script src="/api/v1/ui/cockpit.js"></script>
</body>
</html>
