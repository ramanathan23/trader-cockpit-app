services:

  # ── TimescaleDB ─────────────────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       tradercockpit
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradercockpit"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── .NET 10 API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

      # Override appsettings.json connection string with the compose service name.
      ConnectionStrings__TimescaleDb: >-
        Host=db;Port=5432;Database=tradercockpit;
        Username=postgres;Password=${POSTGRES_PASSWORD}

      # Dhan API credentials — set in .env (never commit real values).
      DhanApi__ClientId:    ${DHAN_CLIENT_ID}
      DhanApi__AccessToken: ${DHAN_ACCESS_TOKEN}

      # Optional tuning (overrides appsettings defaults).
      DhanApi__MaxConcurrency:      ${DHAN_MAX_CONCURRENCY:-5}
      DhanApi__DelayBetweenCallsMs: ${DHAN_DELAY_MS:-120}

    depends_on:
      db:
        condition: service_healthy

volumes:
  timescale_data:
