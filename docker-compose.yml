services:
  db-init:
    image: postgres:16-alpine
    container_name: trader_db_init
    environment:
      PGPASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-}
      PGUSER: ${POSTGRES_SUPERUSER:-postgres}
      PGHOST: ${POSTGRES_HOST:-host.docker.internal}
      PGPORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:-trader_secret}
      DB_NAME: ${DB_NAME:-trader_cockpit}
    volumes:
      - ./infra/db/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks:
      - trader-bridge
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: trader_redis
    ports:
      - "6379:6379"
    volumes:
      - ${DOCKER_DATA_PATH:-d:/docker-data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - trader-bridge
    restart: unless-stopped

  data-sync:
    build:
      context: .
      dockerfile: DataSyncService/Dockerfile
    container_name: trader_data_sync
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID:-}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN:-}
      DHAN_MAX_CONCURRENCY: ${DHAN_MAX_CONCURRENCY:-10}
      DHAN_SYMBOL_BATCH_SIZE: "10"
      SYNC_BATCH_SIZE: ${SYNC_BATCH_SIZE:-50}
      SYNC_1D_HISTORY_DAYS: ${SYNC_1D_HISTORY_DAYS:-1825}
      SYNC_1M_HISTORY_DAYS: ${SYNC_1M_HISTORY_DAYS:-365}
    ports:
      - "8001:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./DataSyncService/src:/app/src:ro
      - ./shared/shared:/usr/local/lib/python3.12/site-packages/shared:ro
    networks:
      - trader-bridge
    restart: unless-stopped

  indicators:
    build:
      context: .
      dockerfile: IndicatorsService/Dockerfile
    container_name: trader_indicators
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INDICATORS_CONCURRENCY: ${INDICATORS_CONCURRENCY:-20}
      MIN_BARS: ${MIN_BARS:-60}
    ports:
      - "8005:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./IndicatorsService/src:/app/src:ro
      - ./shared/shared:/usr/local/lib/python3.12/site-packages/shared:ro
    networks:
      - trader-bridge
    restart: unless-stopped

  ranking:
    build:
      context: .
      dockerfile: RankingService/Dockerfile
    container_name: trader_ranking
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SCORE_CONCURRENCY: ${SCORE_CONCURRENCY:-20}
      MIN_ADV_CRORES: ${MIN_ADV_CRORES:-1.0}
    ports:
      - "8002:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./RankingService/src:/app/src:ro
      - ./shared/shared:/usr/local/lib/python3.12/site-packages/shared:ro
    networks:
      - trader-bridge
    restart: unless-stopped

  live-feed:
    build:
      context: .
      dockerfile: LiveFeedService/Dockerfile
    container_name: trader_live_feed
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID:-}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN:-}
      DHAN_WS_BATCH_SIZE: ${DHAN_WS_BATCH_SIZE:-500}
      DHAN_RECONNECT_DELAY_S: ${DHAN_RECONNECT_DELAY_S:-5.0}
      CANDLE_WRITE_BATCH_SIZE: ${CANDLE_WRITE_BATCH_SIZE:-100}
      CANDLE_WRITE_FLUSH_S: ${CANDLE_WRITE_FLUSH_S:-5.0}
    ports:
      - "8003:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/status', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    volumes:
      - ./LiveFeedService/src:/app/src:ro
      - ./shared/shared:/usr/local/lib/python3.12/site-packages/shared:ro
    networks:
      - trader-bridge
    restart: unless-stopped

  cockpit-ui:
    build:
      context: ./CockpitUI
      dockerfile: Dockerfile
      args:
        LIVE_FEED_URL: http://live-feed:8000
        SCORER_URL: http://ranking:8000
        INDICATORS_URL: http://indicators:8000
        DATASYNC_URL: http://data-sync:8000
        MODELING_URL: http://modeling:8000
        NEXT_PUBLIC_LIVE_FEED_URL: http://localhost:8003
    environment:
      LIVE_FEED_URL: http://live-feed:8000
      SCORER_URL: http://ranking:8000
      INDICATORS_URL: http://indicators:8000
      DATASYNC_URL: http://data-sync:8000
      MODELING_URL: http://modeling:8000
      NEXT_PUBLIC_LIVE_FEED_URL: http://localhost:8003
    container_name: trader_cockpit_ui
    ports:
      - "3000:3000"
    depends_on:
      live-feed:
        condition: service_healthy
      data-sync:
        condition: service_started
      ranking:
        condition: service_started
      modeling:
        condition: service_started
    networks:
      - trader-bridge
    restart: unless-stopped

  modeling:
    build:
      context: .
      dockerfile: ModelingService/Dockerfile
    container_name: trader_modeling
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_BASE_PATH: /models
      AUTO_RETRAIN_ENABLED: ${AUTO_RETRAIN_ENABLED:-true}
      MAX_MODEL_AGE_DAYS: ${MAX_MODEL_AGE_DAYS:-90}
      COMFORT_SCORER_RETRAIN_THRESHOLD_RMSE: ${COMFORT_SCORER_RETRAIN_THRESHOLD_RMSE:-8.0}
      COMFORT_SCORER_SHADOW_DAYS: ${COMFORT_SCORER_SHADOW_DAYS:-7}
    ports:
      - "8004:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./ModelingService/models:/models
      - ./ModelingService/src:/app/src:ro
      - ./shared/shared:/usr/local/lib/python3.12/site-packages/shared:ro
    networks:
      - trader-bridge
    restart: unless-stopped

  notebooks:
    build:
      context: ./notebooks
      dockerfile: Dockerfile
    container_name: trader_notebooks
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${DB_NAME:-trader_cockpit}
    ports:
      - "8888:8888"
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./notebooks:/app/notebooks
    networks:
      - trader-bridge
    restart: unless-stopped

volumes:
  ml_models:

networks:
  trader-bridge:
    driver: bridge
