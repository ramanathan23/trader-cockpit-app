services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trader_timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trader_secret}
      POSTGRES_DB: ${DB_NAME:-trader_cockpit}
    # PostgreSQL tuning for bulk time-series ingestion.
    # synchronous_commit=off: commits return immediately without waiting for
    # WAL flush — acceptable for market data (losing last ~100ms on crash is fine)
    # and gives a significant insert throughput boost.
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c max_wal_size=2GB
        -c synchronous_commit=off
        -c max_connections=100
        -c timescaledb.max_background_workers=4
        -c tcp_keepalives_idle=60
        -c tcp_keepalives_interval=10
        -c tcp_keepalives_count=5
    volumes:
      - ${DOCKER_DATA_PATH:-d:/docker-data}/timescaledb:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-trader_cockpit}"]
      interval: 10s
      timeout: 5s
      # Allow up to 10 minutes for WAL crash recovery + post-recovery checkpoint
      # before Docker marks the container unhealthy and dependent services fail.
      start_period: 600s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trader_redis
    ports:
      - "6379:6379"
    volumes:
      - ${DOCKER_DATA_PATH:-d:/docker-data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  data-sync:
    build:
      context: ./DataSyncService
      dockerfile: Dockerfile
    container_name: trader_data_sync
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@timescaledb:5432/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID:-}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN:-}
      DHAN_MAX_CONCURRENCY: ${DHAN_MAX_CONCURRENCY:-10}
      DHAN_SYMBOL_BATCH_SIZE: "10"
      SYNC_BATCH_SIZE: ${SYNC_BATCH_SIZE:-50}
      SYNC_1D_HISTORY_DAYS: ${SYNC_1D_HISTORY_DAYS:-1825}
      SYNC_1M_HISTORY_DAYS: ${SYNC_1M_HISTORY_DAYS:-365}
    ports:
      - "8001:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./DataSyncService/src:/app/src:ro
    restart: unless-stopped

  momentum-scorer:
    build:
      context: ./MomentumScorerService
      dockerfile: Dockerfile
    container_name: trader_momentum_scorer
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@timescaledb:5432/${DB_NAME:-trader_cockpit}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SCORE_LOOKBACK_BARS: ${SCORE_LOOKBACK_BARS:-200}
      SCORE_CONCURRENCY: ${SCORE_CONCURRENCY:-10}
      WEIGHT_RSI: ${WEIGHT_RSI:-0.30}
      WEIGHT_MACD: ${WEIGHT_MACD:-0.30}
      WEIGHT_ROC: ${WEIGHT_ROC:-0.25}
      WEIGHT_VOL: ${WEIGHT_VOL:-0.15}
    ports:
      - "8002:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notebooks:
    build:
      context: ./notebooks
      dockerfile: Dockerfile
    container_name: trader_notebooks
    environment:
      DATABASE_URL: postgresql://${DB_USER:-trader}:${DB_PASSWORD:-trader_secret}@timescaledb:5432/${DB_NAME:-trader_cockpit}
    ports:
      - "8888:8888"
    depends_on:
      timescaledb:
        condition: service_healthy
    volumes:
      - ./notebooks:/app/notebooks
    restart: unless-stopped
